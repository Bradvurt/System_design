components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
    fs-task-processor:
      worker_threads: 1
  default_task_processor: main-task-processor

  components:
    server:
      listener:
        port: 8080

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: info
          overflow_behavior: discard

    testsuite-support:
      load-enabled: false          # отключаем, чтобы не мешал

    redis-cache:
      groups:
        - config_name: cache-redis
          db: cache-redis
      subscribe_groups: []
      thread_pools:
        redis_thread_pool_size: 4
        sentinel_thread_pool_size: 1

    hotel-booking-service: {}

    handler-auth-register:
      path: /api/v1/auth/register
      method: POST
      task_processor: main-task-processor

    handler-auth-login:
      path: /api/v1/auth/login
      method: POST
      task_processor: main-task-processor

    handler-user-by-login:
      path: /api/v1/users/by-login/{login}
      method: GET
      task_processor: main-task-processor

    handler-user-search:
      path: /api/v1/users/search
      method: GET
      task_processor: main-task-processor

    handler-hotels:
      path: /api/v1/hotels
      method: GET,POST
      task_processor: main-task-processor

    handler-bookings:
      path: /api/v1/bookings
      method: POST
      task_processor: main-task-processor

    handler-user-bookings:
      path: /api/v1/users/{user_id}/bookings
      method: GET
      task_processor: main-task-processor

    handler-booking-by-id:
      path: /api/v1/bookings/{booking_id}
      method: DELETE
      task_processor: main-task-processor