# config.yaml
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        # Handlers are registered via static config or dynamic config
        # The handlers themselves are added in main.cpp via Append<>